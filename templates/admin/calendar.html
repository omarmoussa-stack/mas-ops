{% extends "base.html" %}
{% block title %}Calendar — MAS Ops{% endblock %}

{% block head_extra %}
<link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet">
{% endblock %}

{% block content %}
<div class="d-flex justify-content-between align-items-center mb-3">
  <h4 class="mb-0 fw-semibold"><i class="bi bi-calendar3 me-2"></i>Calendar</h4>
  <a href="{{ url_for('admin.job_new') }}" class="btn btn-primary btn-sm">
    <i class="bi bi-plus-lg me-1"></i>New Job
  </a>
</div>

{# Filters #}
<div class="card border-0 shadow-sm mb-3">
  <div class="card-body py-2 d-flex gap-3 flex-wrap align-items-center">
    <div>
      <label class="form-label mb-0 me-2 small text-muted">Technician</label>
      <select id="techFilter" class="form-select form-select-sm d-inline-block w-auto">
        <option value="">All technicians</option>
        {% for tech in techs %}
          <option value="{{ tech.id }}">{{ tech.full_name }}</option>
        {% endfor %}
      </select>
    </div>
    <div>
      <label class="form-label mb-0 me-2 small text-muted">Status</label>
      <select id="statusFilter" class="form-select form-select-sm d-inline-block w-auto">
        <option value="">All statuses</option>
        <option value="Incomplete">Incomplete</option>
        <option value="In Process">In Process</option>
        <option value="Completed">Completed</option>
      </select>
    </div>
  </div>
</div>

<div class="card border-0 shadow-sm">
  <div class="card-body">
    <div id="calendar"></div>
  </div>
</div>

{# Job detail modal #}
<div class="modal fade" id="jobModal" tabindex="-1">
  <div class="modal-dialog">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title" id="modalTitle">Job Details</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body small" id="modalBody"></div>
      <div class="modal-footer">
        <a id="modalEditLink" href="#" class="btn btn-primary btn-sm">Edit job</a>
        <button type="button" class="btn btn-secondary btn-sm" data-bs-dismiss="modal">Close</button>
      </div>
    </div>
  </div>
</div>
{% endblock %}

{% block scripts %}
<script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script>
<script>
document.addEventListener('DOMContentLoaded', function () {
  const calEl = document.getElementById('calendar');
  const modal = new bootstrap.Modal(document.getElementById('jobModal'));

  function buildFeedUrl() {
    const params = new URLSearchParams();
    const tech   = document.getElementById('techFilter').value;
    const status = document.getElementById('statusFilter').value;
    if (tech)   params.set('technician_id', tech);
    if (status) params.set('status', status);
    return BASE_URL + '/api/calendar/events?' + params.toString();
  }

  const isMobile = window.matchMedia('(max-width: 768px)').matches;

  const calendar = new FullCalendar.Calendar(calEl, {
    initialView: isMobile ? 'listMonth' : 'dayGridMonth',
    headerToolbar: isMobile
      ? { left: 'prev,next', center: 'title', right: 'today' }
      : { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek,listMonth' },
    height: 'auto',
    contentHeight: isMobile ? 'auto' : 700,
    expandRows: true,
    dayMaxEvents: isMobile ? false : 3,
    moreLinkClick: 'popover',
    displayEventTime: true,
    displayEventEnd: false,
    eventDisplay: 'block',
    events: buildFeedUrl(),
    eventClick(info) {
      const p = info.event.extendedProps;
      document.getElementById('modalTitle').textContent = info.event.title;
      document.getElementById('modalBody').innerHTML = `
        <dl class="row mb-0">
          <dt class="col-4 text-muted fw-normal">Status</dt>
          <dd class="col-8">${p.status}</dd>
          <dt class="col-4 text-muted fw-normal">Location</dt>
          <dd class="col-8">${p.location}</dd>
          <dt class="col-4 text-muted fw-normal">Phone</dt>
          <dd class="col-8"><a href="tel:${p.phone}">${p.phone}</a></dd>
          <dt class="col-4 text-muted fw-normal">Technician</dt>
          <dd class="col-8">${p.technician || '—'}</dd>
          ${p.amount != null ? `<dt class="col-4 text-muted fw-normal">Amount</dt><dd class="col-8">EGP ${Number(p.amount).toLocaleString()}</dd>` : ''}
        </dl>`;
      document.getElementById('modalEditLink').href =
        BASE_URL + '/admin/jobs/' + info.event.id + '/edit';
      modal.show();
    },
  });
  calendar.render();

  document.getElementById('techFilter').addEventListener('change', () => {
    calendar.setOption('events', buildFeedUrl());
  });
  document.getElementById('statusFilter').addEventListener('change', () => {
    calendar.setOption('events', buildFeedUrl());
  });

  let resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(resizeTimer);
    resizeTimer = setTimeout(() => {
      const nowMobile = window.matchMedia('(max-width: 768px)').matches;
      if (nowMobile !== isMobile) {
        location.reload();
      }
    }, 300);
  });
});
</script>
{% endblock %}
