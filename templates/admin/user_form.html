{% extends "base.html" %}
{% block title %}{{ "Edit User" if user else "New User" }} — MAS Ops{% endblock %}

{% block content %}
<div class="d-flex align-items-center gap-2 mb-4">
  <a href="{{ url_for('admin.users_list') }}" class="text-muted text-decoration-none small">
    <i class="bi bi-arrow-left me-1"></i>Users
  </a>
</div>

<div class="row justify-content-center">
  <div class="col-md-6 col-lg-5">
    <h5 class="fw-semibold mb-4">
      {{ "Edit user — " ~ user.username if user else "Create new user" }}
    </h5>

    <form method="post">
      <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
      <div class="mb-3">
        <label class="form-label fw-medium">Full name <span class="text-danger">*</span></label>
        <input type="text" name="full_name" class="form-control" required
               value="{{ user.full_name if user else '' }}">
      </div>

      {% if not user %}
      <div class="mb-3">
        <label class="form-label fw-medium">Username <span class="text-danger">*</span></label>
        <input type="text" name="username" class="form-control" required
               autocomplete="off">
      </div>
      {% endif %}

      <div class="mb-3">
        <label class="form-label fw-medium">
          Password {% if user %}<span class="text-muted small">(leave blank to keep current)</span>{% else %}<span class="text-danger">*</span>{% endif %}
        </label>
        <input type="password" name="password" class="form-control"
               autocomplete="new-password"
               {% if not user %}required minlength="6"{% endif %}>
        <div class="form-text">Minimum 6 characters.</div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-medium">Role <span class="text-danger">*</span></label>
        <select name="role" class="form-select" required>
          <option value="tech"  {% if user and user.role == 'tech'  %}selected{% endif %}>Technician</option>
          <option value="admin" {% if user and user.role == 'admin' %}selected{% endif %}>Admin</option>
        </select>
      </div>

      <div class="d-flex gap-2">
        <button type="submit" class="btn btn-primary">
          {{ "Save changes" if user else "Create user" }}
        </button>
        <a href="{{ url_for('admin.users_list') }}" class="btn btn-outline-secondary">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock %}
